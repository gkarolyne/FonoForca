<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FonoForca</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="login-screen" class="center">
    <h2>FonoForca</h2>
    <input type="text" id="username" placeholder="Nome do paciente">
    <button onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none">

    <div class="header">
        <span id="userDisplay"></span>
        <button onclick="logout()">Sair</button>
    </div>

    <div class="container">

        <!-- NÍVEL -->
        <div class="card center">
            <select id="level">
                <option value="inicio">R no início</option>
                <option value="meio">R no meio</option>
                <option value="final">R no final</option>
                <option value="encontro">Encontro consonantal</option>
            </select>
            <button onclick="startGame()">🎮 Novo jogo</button>
        </div>

        <!-- FORCA -->
        <div class="card center">
            <div id="hangman"></div>
            <div id="word"></div>
            <div id="hint"></div>
            <p>Erros: <span id="errors">0</span>/6</p>
            <div id="message"></div>
        </div>

        <!-- LETRAS -->
        <div class="card">
            <div id="letters"></div>
        </div>

        <!-- VOZ -->
        <div class="card center">
            <button onclick="startRecording()">🎤 Gravar</button>
            <button onclick="playAudio()">▶️ Ouvir</button>
        </div>

        <!-- PROGRESSO -->
        <div class="card">
            <h3>📊 Evolução do paciente</h3>
            <p>⭐ XP: <span id="xp">0</span></p>
            <p>🎯 Acertos: <span id="hits">0</span></p>
            <p>❌ Erros: <span id="miss">0</span></p>
            <p>📈 Tentativas: <span id="tries">0</span></p>
        </div>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
